<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .card {
    background: {{bg_color}};
    color: {{text_color}};
    font-family: '{{font_family}}', 'Inter', sans-serif;
    display: flex;
    flex-direction: row;
  }
  .left-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px;
    position: relative;
    z-index: 2;
  }
  .right-panel {
    width: 50%;
    position: relative;
    overflow: hidden;
  }
  .right-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .right-panel .overlay {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    overflow: hidden;
    margin: 32px 32px 32px 0;
  }
  .right-panel .overlay img {
    border-radius: 24px;
  }
  .brand-name { color: {{text_color}}; }
  .headline { color: {{text_color}}; }
  .headline .accent { color: {{accent_color}}; }
  .body-text { color: {{text_color}}; }
  .cta-btn {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .contact-info { color: {{text_color}}; }
  .contact-info .dot { background: {{text_color}}; }
  .tag-pill {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .deco-circle { background: {{secondary_color}}; }
</style>
</head>
<body>
<!-- Pattern 2: Split Layout — image + text side by side -->
<div class="card">
  <div class="deco-circle" style="width:120px;height:120px;top:-30px;left:-30px;"></div>

  <div class="left-panel">
    <div>
      {{#if logo_url}}
      <img class="brand-logo" src="{{logo_url}}" alt="{{brand_name}}" style="margin-bottom:32px;">
      {{else}}
      <span class="brand-name" style="display:block;margin-bottom:32px;">{{brand_name}}</span>
      {{/if}}

      {{#if tag_text}}
      <span class="tag-pill" style="margin-bottom:24px;">{{tag_text}}</span>
      {{/if}}
    </div>

    <div>
      <h1 class="headline lg" style="margin-bottom:24px;">{{headline}}</h1>
      {{#if body_text}}
      <p class="body-text" style="margin-bottom:32px;">{{body_text}}</p>
      {{/if}}
    </div>

    <div>
      <a class="cta-btn" href="#" style="margin-bottom:20px;display:inline-block;">{{cta_text}}</a>
      <div class="contact-info" style="margin-top:16px;">
        <span>{{website}}</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="overlay">
      {{#if photo_url}}
      <img src="{{photo_url}}" alt="{{photo_alt}}">
      {{else}}
      <div style="width:100%;height:100%;background:{{secondary_color}};"></div>
      {{/if}}
    </div>
  </div>
</div>
</body>
</html>
