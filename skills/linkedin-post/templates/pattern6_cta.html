<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .card {
    background: {{bg_color}};
    color: {{text_color}};
    font-family: '{{font_family}}', 'Inter', sans-serif;
  }
  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .brand-name { color: {{text_color}}; }
  .headline { color: {{text_color}}; text-align: center; }
  .headline .accent { color: {{accent_color}}; }
  .cta-btn {
    background: {{accent_color}};
    color: {{accent_text_color}};
    font-size: 28px;
    padding: 24px 56px;
    margin-top: 48px;
  }
  .contact-bar {
    position: absolute;
    bottom: 48px;
    left: 56px;
    right: 56px;
    display: flex;
    justify-content: center;
    gap: 24px;
    z-index: 2;
  }
  .contact-bar span {
    font-size: 20px;
    font-weight: 500;
    opacity: 0.65;
  }
  .contact-bar .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: {{text_color}};
    opacity: 0.4;
    align-self: center;
  }
  .top-logo {
    position: absolute;
    top: 48px;
    left: 56px;
    z-index: 2;
  }
  .deco-circle { background: {{accent_color}}; }
  .deco-blob { background: {{secondary_color}}; }
</style>
</head>
<body>
<!-- Pattern 6: CTA / Closing Slide Layout -->
<div class="card">
  <div class="deco-circle" style="width:300px;height:300px;top:-120px;right:-120px;"></div>
  <div class="deco-circle" style="width:200px;height:200px;bottom:-80px;left:-80px;"></div>
  <div class="deco-blob" style="width:160px;height:160px;top:200px;left:-60px;"></div>

  <!-- Top logo -->
  <div class="top-logo">
    {{#if logo_url}}
    <img class="brand-logo" src="{{logo_url}}" alt="{{brand_name}}" style="height:48px;">
    {{else}}
    <span class="brand-name" style="font-size:28px;">{{brand_name}}</span>
    {{/if}}
  </div>

  <div class="card-inner">
    <h1 class="headline xl">{{headline}}</h1>
    <a class="cta-btn" href="#">{{cta_text}}</a>
  </div>

  <!-- Contact bar -->
  <div class="contact-bar">
    {{#if phone}}
    <span>{{phone}}</span>
    <span class="dot"></span>
    {{/if}}
    <span>{{website}}</span>
    {{#if social_handle}}
    <span class="dot"></span>
    <span>{{social_handle}}</span>
    {{/if}}
  </div>
</div>
</body>
</html>
