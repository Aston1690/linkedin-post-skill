<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .card {
    background: {{bg_color}};
    color: {{text_color}};
    font-family: '{{font_family}}', 'Inter', sans-serif;
  }
  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .brand-name { color: {{text_color}}; }
  .tag-pill {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .headline { color: {{text_color}}; }
  .headline .accent { color: {{accent_color}}; }
  .body-text { color: {{text_color}}; }
  .cta-btn {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .contact-info { color: {{text_color}}; }
  .contact-info .dot { background: {{text_color}}; }
  .stars { color: {{accent_color}}; }
  .quote-mark {
    font-size: 120px;
    line-height: 1;
    font-weight: 900;
    color: {{accent_color}};
    opacity: 0.3;
    position: absolute;
    top: -20px;
    left: -8px;
  }
  .quote-section {
    padding: 24px 56px;
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .attribution {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 32px;
  }
  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    background: {{accent_color}};
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: {{accent_text_color}};
  }
  .attr-name {
    font-weight: 700;
    font-size: 24px;
  }
  .attr-title {
    font-size: 20px;
    opacity: 0.65;
    margin-top: 4px;
  }
  .deco-circle { background: {{secondary_color}}; }
</style>
</head>
<body>
<!-- Pattern 3: Testimonial / Social Proof -->
<div class="card">
  <div class="deco-circle" style="width:180px;height:180px;bottom:-60px;right:-40px;"></div>

  <div class="card-inner">
    <!-- Top bar -->
    <div class="top-bar">
      <div>
        {{#if logo_url}}
        <img class="brand-logo" src="{{logo_url}}" alt="{{brand_name}}">
        {{else}}
        <span class="brand-name">{{brand_name}}</span>
        {{/if}}
      </div>
      <span class="tag-pill">{{tag_text}}</span>
    </div>

    <!-- Quote section -->
    <div class="quote-section">
      <div style="position:relative;">
        <span class="quote-mark">&ldquo;</span>
        <h1 class="headline lg" style="padding-left:0;margin-top:40px;">{{headline}}</h1>
      </div>

      {{#if body_text}}
      <p class="body-text lg" style="margin-top:28px;font-style:italic;opacity:0.75;">{{body_text}}</p>
      {{/if}}

      <div class="attribution">
        <div class="avatar">
          {{#if avatar_url}}
          <img src="{{avatar_url}}" alt="{{client_name}}">
          {{else}}
          <div class="avatar-placeholder">{{client_initial}}</div>
          {{/if}}
        </div>
        <div>
          <div class="attr-name">{{client_name}}</div>
          <div class="attr-title">{{client_title}}</div>
          <div class="stars" style="margin-top:8px;">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
        </div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <a class="cta-btn" href="#">{{cta_text}}</a>
      <div class="contact-info">
        <span>{{website}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
