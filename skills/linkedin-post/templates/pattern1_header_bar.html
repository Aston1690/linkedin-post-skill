<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .card {
    background: {{bg_color}};
    color: {{text_color}};
    font-family: '{{font_family}}', 'Inter', sans-serif;
  }
  .brand-name { color: {{text_color}}; }
  .tag-pill {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .headline { color: {{text_color}}; }
  .headline .accent { color: {{accent_color}}; }
  .headline .highlight {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .body-text { color: {{text_color}}; }
  .cta-btn {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .contact-info { color: {{text_color}}; }
  .contact-info .dot { background: {{text_color}}; }
  .deco-circle { background: {{secondary_color}}; }
  .deco-blob { background: {{accent_color}}; }
  .photo-frame { border: 4px solid {{secondary_color}}20; }
  .content-card {
    background: {{secondary_color}};
    color: {{text_color}};
  }

  /* Layout-specific */
  .headline-zone {
    padding: 20px 56px 0;
    position: relative;
    z-index: 2;
  }
  .content-zone {
    padding: 32px 56px;
    position: relative;
    z-index: 2;
    flex: 1;
  }
  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
</style>
</head>
<body>
<!-- Pattern 1: Header Bar Layout — most common default -->
<div class="card">
  <!-- Decorative shapes -->
  <div class="deco-circle" style="width:200px;height:200px;top:-60px;right:-40px;"></div>
  <div class="deco-blob" style="width:160px;height:160px;bottom:180px;left:-50px;"></div>
  <div class="deco-circle" style="width:80px;height:80px;bottom:300px;right:40px;opacity:0.08;"></div>

  <div class="card-inner">
    <!-- Top bar -->
    <div class="top-bar">
      <div>
        {{#if logo_url}}
        <img class="brand-logo" src="{{logo_url}}" alt="{{brand_name}}">
        {{else}}
        <span class="brand-name">{{brand_name}}</span>
        {{/if}}
      </div>
      {{#if tag_text}}
      <span class="tag-pill">{{tag_text}}</span>
      {{/if}}
    </div>

    <!-- Headline zone -->
    <div class="headline-zone">
      <h1 class="headline xl">{{headline}}</h1>
    </div>

    <!-- Content zone -->
    <div class="content-zone">
      {{#if photo_url}}
      <div class="photo-frame" style="width:100%;height:360px;margin-bottom:24px;">
        <img src="{{photo_url}}" alt="{{photo_alt}}">
      </div>
      {{/if}}

      {{#if body_text}}
      <p class="body-text">{{body_text}}</p>
      {{/if}}

      {{#if bullet_points}}
      <ul class="bullet-list" style="margin-top:24px;">
        <!-- Repeat for each bullet -->
        {{bullet_points_html}}
      </ul>
      {{/if}}
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <a class="cta-btn" href="#">{{cta_text}}</a>
      <div class="contact-info">
        <span>{{website}}</span>
        {{#if phone}}
        <span class="dot"></span>
        <span>{{phone}}</span>
        {{/if}}
      </div>
    </div>
  </div>
</div>
</body>
</html>
