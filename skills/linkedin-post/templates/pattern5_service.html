<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .card {
    background: {{bg_color}};
    color: {{text_color}};
    font-family: '{{font_family}}', 'Inter', sans-serif;
  }
  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .brand-name { color: {{text_color}}; }
  .headline { color: {{text_color}}; }
  .headline .accent { color: {{accent_color}}; }
  .body-text { color: {{text_color}}; }

  .headline-zone {
    padding: 20px 56px 0;
    position: relative;
    z-index: 2;
  }
  .services-zone {
    padding: 32px 56px;
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .service-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .service-pill {
    background: {{secondary_color}};
    color: {{text_color}};
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .service-pill .pill-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: {{accent_color}};
    color: {{accent_text_color}};
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .cta-btn {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .contact-info { color: {{text_color}}; }
  .contact-info .dot { background: {{text_color}}; }
  .tag-pill {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .deco-circle { background: {{secondary_color}}; }
  .deco-blob { background: {{accent_color}}; }

  .bottom-contact {
    padding: 0 56px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 2;
  }
</style>
</head>
<body>
<!-- Pattern 5: Service / Value Proposition Layout -->
<div class="card">
  <div class="deco-blob" style="width:140px;height:140px;top:-40px;right:-40px;"></div>
  <div class="deco-circle" style="width:100px;height:100px;bottom:160px;left:-30px;"></div>

  <div class="card-inner">
    <!-- Top bar -->
    <div class="top-bar">
      <div>
        {{#if logo_url}}
        <img class="brand-logo" src="{{logo_url}}" alt="{{brand_name}}">
        {{else}}
        <span class="brand-name">{{brand_name}}</span>
        {{/if}}
      </div>
      <div class="contact-info">
        <span>{{website}}</span>
      </div>
    </div>

    <!-- Headline zone -->
    <div class="headline-zone">
      <h1 class="headline lg">{{headline}}</h1>
    </div>

    <!-- Services zone -->
    <div class="services-zone">
      <div class="service-grid">
        {{services_html}}
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-contact">
      <a class="cta-btn" href="#">{{cta_text}}</a>
      <div class="contact-info">
        {{#if social_handle}}
        <span>{{social_handle}}</span>
        <span class="dot"></span>
        {{/if}}
        <span>{{website}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
