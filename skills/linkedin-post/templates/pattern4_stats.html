<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .card {
    background: {{bg_color}};
    color: {{text_color}};
    font-family: '{{font_family}}', 'Inter', sans-serif;
  }
  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .brand-name { color: {{text_color}}; }
  .tag-pill {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .headline { color: {{text_color}}; }
  .hero-stat {
    font-size: 160px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    color: {{accent_color}};
    text-align: center;
  }
  .stat-label {
    font-size: 36px;
    font-weight: 600;
    text-align: center;
    opacity: 0.8;
    margin-top: 8px;
  }
  .stat-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 56px;
    position: relative;
    z-index: 2;
  }
  .body-text { color: {{text_color}}; }
  .content-card {
    background: {{secondary_color}};
    color: {{text_color}};
    margin-top: 32px;
    width: 100%;
    max-width: 880px;
    text-align: center;
  }
  .cta-btn {
    background: {{accent_color}};
    color: {{accent_text_color}};
  }
  .contact-info { color: {{text_color}}; }
  .contact-info .dot { background: {{text_color}}; }
  .deco-circle { background: {{accent_color}}; }
  .deco-blob { background: {{secondary_color}}; }
</style>
</head>
<body>
<!-- Pattern 4: Stats / Data-Driven Layout -->
<div class="card">
  <div class="deco-circle" style="width:240px;height:240px;top:-80px;left:-80px;"></div>
  <div class="deco-circle" style="width:100px;height:100px;bottom:200px;right:-30px;opacity:0.08;"></div>

  <div class="card-inner">
    <!-- Top bar -->
    <div class="top-bar">
      <div>
        {{#if logo_url}}
        <img class="brand-logo" src="{{logo_url}}" alt="{{brand_name}}">
        {{else}}
        <span class="brand-name">{{brand_name}}</span>
        {{/if}}
      </div>
      {{#if tag_text}}
      <span class="tag-pill">{{tag_text}}</span>
      {{/if}}
    </div>

    <!-- Stat zone -->
    <div class="stat-zone">
      <div class="hero-stat">{{stat_number}}</div>
      <div class="stat-label">{{stat_label}}</div>

      {{#if body_text}}
      <div class="content-card">
        <p class="body-text">{{body_text}}</p>
      </div>
      {{/if}}
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <a class="cta-btn" href="#">{{cta_text}}</a>
      <div class="contact-info">
        <span>{{website}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
